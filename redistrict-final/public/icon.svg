<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Black background with subtle rounded corners -->
  <rect width="32" height="32" rx="4" ry="4" fill="#000000"/>

  <!-- Top colon dot -->
  <rect x="14" y="10" width="4" height="4" rx="1" fill="#ffffff">
    <animate
      attributeName="opacity"
      values="1;0;1"
      dur="2s"
      calcMode="discrete"
      repeatCount="indefinite"
      begin="0s"
    />
  </rect>

  <!-- Bottom colon dot -->
  <rect x="14" y="18" width="4" height="4" rx="1" fill="#ffffff">
    <animate
      attributeName="opacity"
      values="1;0;1"
      dur="2s"
      calcMode="discrete"
      repeatCount="indefinite"
      begin="0s"
    />
  </rect>

  <!-- Faint RE text — left side, tiny -->
  <text
    x="4"
    y="20"
    font-family="monospace"
    font-size="6"
    fill="rgba(255,255,255,0.25)"
    letter-spacing="0"
    font-weight="300"
  >RE</text>

  <!-- Faint DI text — right side, tiny -->
  <text
    x="20"
    y="20"
    font-family="monospace"
    font-size="6"
    fill="rgba(255,255,255,0.25)"
    letter-spacing="0"
    font-weight="300"
  >DI</text>
</svg>
